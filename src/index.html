<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title></title>
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="css/ntp.css" />
    <script src="js/ntp.js" type="module"></script>
  </head>

  <body>
    <img src="" id="image" class="fs" alt="Background image" hidden />
    <div class="fs" id="overlay"></div>
    <a href="#" target="_blank" id="sources" hidden>Sources</a>
    <button type="button" id="btn-settings" hidden></button>

    <!-- Settings Dialog -->
    <dialog id="settings-dialog">
      <form id="settings" method="dialog">
        <div class="dialog-header">
          <h2 id="settings-title"></h2>
          <button type="button" id="btn-close-dialog" class="btn-close">&times;</button>
        </div>
        <section class="file-row">
          <label for="inp-file" id="inp-file-label" class="btn btn-block">Choose an image</label>
          <input type="file" id="inp-file" accept="image/*" tabindex="-1" />
          <button type="button" id="btn-reset" class="btn-reset" title="Reset to default wallpaper">&times;</button>
        </section>
        <section class="label-input">
          <label for="inp-overlay-darken" id="inp-overlay-darken-label">Darken:</label>
          <input type="range" min="0.0" max="1.0" step="0.1" id="inp-overlay-darken" />
        </section>
      </form>
    </dialog>

    <!-- Message wrapper for notifications -->
    <section id="message-wrapper"></section>
  </body>
</html>
